<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spyne · Image Insights Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --purple:#6B2FD9; --purple-l:#8B5CF6; --purple-bg:#F5F0FF; --purple-mid:#EDE9FE;
  --bg:#F7F5FF; --white:#FFFFFF; --border:#E5E0F5;
  --text:#1A1A2E; --text2:#3D3A5C; --muted:#7B7A9A;
  --green:#059669; --green-bg:#ECFDF5;
  --amber:#D97706; --amber-bg:#FFFBEB;
  --red:#DC2626; --red-bg:#FEF2F2;
  --blue:#2563EB; --blue-bg:#EFF6FF;
  --shadow:0 1px 4px rgba(107,47,217,0.08),0 4px 16px rgba(107,47,217,0.06);
  --shadow-lg:0 8px 32px rgba(107,47,217,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:"Plus Jakarta Sans",sans-serif;font-size:14px;}

/* NAV */
.nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(107,47,217,0.06);}
.nav-left{display:flex;align-items:center;gap:14px;}
.nav-logo img{height:36px;width:auto;}
.nav-div{width:1px;height:28px;background:var(--border);}
.nav-badge{background:var(--purple-mid);color:var(--purple);font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;}
.nav-right{display:flex;align-items:center;gap:12px;}
.last-upd{font-size:12px;color:var(--muted);}
.btn{background:var(--purple);color:white;border:none;padding:9px 20px;border-radius:50px;font-size:13px;font-weight:700;font-family:"Plus Jakarta Sans",sans-serif;cursor:pointer;transition:background 0.15s;box-shadow:0 2px 8px rgba(107,47,217,0.25);}
.btn:hover{background:#5B24C4;}
.btn-outline{background:white;color:var(--purple);border:1.5px solid var(--purple);padding:7px 16px;border-radius:50px;font-size:12px;font-weight:700;font-family:"Plus Jakarta Sans",sans-serif;cursor:pointer;transition:all 0.15s;}
.btn-outline:hover{background:var(--purple);color:white;}
.btn-outline.active{background:var(--purple);color:white;}

/* MAIN */
.main{max-width:1440px;margin:0 auto;padding:28px 32px;}

/* HERO */
.hero{background:linear-gradient(135deg,var(--purple) 0%,#9B59F6 100%);border-radius:16px;padding:24px 32px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;color:white;box-shadow:var(--shadow-lg);position:relative;overflow:hidden;}
.hero::before{content:"";position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:rgba(255,255,255,0.06);border-radius:50%;}
.hero-title{font-size:20px;font-weight:800;margin-bottom:3px;}
.hero-sub{font-size:12px;opacity:0.8;}
.hero-stats{display:flex;gap:32px;position:relative;z-index:1;}
.hero-stat{text-align:center;}
.hero-stat-val{font-size:26px;font-weight:800;letter-spacing:-0.5px;}
.hero-stat-label{font-size:11px;opacity:0.75;margin-top:2px;}

/* CONTROLS */
.controls{display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
.control-group{display:flex;align-items:center;gap:8px;}
.control-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:6px 14px;border-radius:50px;border:1.5px solid var(--border);background:var(--white);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:"Plus Jakarta Sans",sans-serif;}
.chip:hover{border-color:var(--purple);color:var(--purple);}
.chip.active{background:var(--purple);color:white;border-color:var(--purple);}
.chip.mtd{border-color:var(--amber);color:var(--amber);}
.chip.mtd.active{background:var(--amber);color:white;border-color:var(--amber);}

/* SECTION */
.sec-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:24px 0 14px;display:flex;align-items:center;gap:10px;}
.sec-label::after{content:"";flex:1;height:1px;background:var(--border);}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:4px;}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:var(--shadow);transition:box-shadow 0.2s,transform 0.2s;position:relative;overflow:hidden;}
.kpi-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);}
.kpi-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;}
.kpi-card.kp{--c:var(--purple);} .kpi-card.kg{--c:var(--green);} .kpi-card.ka{--c:var(--amber);} .kpi-card.kr{--c:var(--red);} .kpi-card.kb{--c:var(--blue);}
.kpi-card::before{background:var(--c);}
.kpi-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px;background:color-mix(in srgb, var(--c) 12%, white);}
.kpi-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.kpi-val{font-size:24px;font-weight:800;letter-spacing:-0.5px;line-height:1;color:var(--c);}
.kpi-val.dark{color:var(--text);}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:5px;}

/* CHARTS */
.charts-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
.charts-1{display:grid;grid-template-columns:1fr;gap:18px;margin-bottom:18px;}
.chart-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:22px;box-shadow:var(--shadow);}
.chart-hd{margin-bottom:16px;}
.chart-title{font-size:13px;font-weight:700;}
.chart-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.chart-wrap{position:relative;height:220px;}

/* TABLES */
.tables-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
.table-card{background:var(--white);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;}
.table-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.table-hd-title{font-size:13px;font-weight:700;}
.table-hd-badge{background:var(--purple-mid);color:var(--purple);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--purple-bg);}
tbody td{padding:11px 14px;white-space:nowrap;color:var(--text2);font-weight:500;}
tbody td:first-child{font-weight:700;color:var(--purple);}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.bg-g{background:var(--green-bg);color:var(--green);}
.bg-a{background:var(--amber-bg);color:var(--amber);}
.bg-r{background:var(--red-bg);color:var(--red);}
.bg-p{background:var(--purple-mid);color:var(--purple);}
.seg-chip{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.seg-Ent{background:#EFF6FF;color:#2563EB;}
.seg-SMB{background:#ECFDF5;color:#059669;}
.seg-Resellers{background:#FFFBEB;color:#D97706;}
.seg-Mid{background:#F5F0FF;color:#6B2FD9;}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin 0.7s linear infinite;}
.loading-text{color:var(--muted);font-size:14px;font-weight:500;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr);}.charts-2,.tables-2{grid-template-columns:1fr;}}
@media(max-width:640px){.main{padding:16px;}.nav{padding:0 16px;}.kpi-grid{grid-template-columns:repeat(2,1fr);}.hero{flex-direction:column;gap:16px;}}
</style>
</head>

let sortState={key:null,dir:1}; // dir: 1=asc, -1=desc

function sortTable(data, key){
  if(sortState.key===key) sortState.dir*=-1;
  else { sortState.key=key; sortState.dir=1; }
  return [...data].sort((a,b)=>{
    const av=clean(a[key]||0), bv=clean(b[key]||0);
    if(av===bv) return 0;
    return av>bv ? sortState.dir : -sortState.dir;
  });
}

function thSort(label, key, data, renderFn){
  const arrow = sortState.key===key ? (sortState.dir===1?'↑':'↓') : '↕';
  return `<th style="cursor:pointer;user-select:none;" onclick="${renderFn}('${key}')">${label} <span style="color:var(--purple);font-size:10px;">${arrow}</span></th>`;
}

const clean=v=>parseFloat(String(v||0).replace(/,/g,'').replace(/%/g,'').trim())||0;
const fmt=v=>{const n=clean(v);if(!n&&!v)return'—';return n>=1e6?(n/1e6).toFixed(2)+'M':n>=1000?(n/1000).toFixed(1)+'K':String(n);};
const fmtARR=v=>{const n=clean(v);return n>=1e6?'$'+(n/1e6).toFixed(2)+'M':n>=1000?'$'+(n/1000).toFixed(0)+'K':'$'+n.toFixed(0);};
const pct=v=>String(v).replace(' %','')+'%';
const badge=v=>{const n=clean(v);const c=n>=90?'bg-g':n>=80?'bg-a':'bg-r';return`<span class="badge ${c}">${pct(v)}</span>`;};
const segChip=s=>`<span class="seg-chip seg-${s}">${s}</span>`;

async function fetchJSON(url){
  try{
    const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
    const j=await r.json();
    if(Array.isArray(j)&&j.length) return j;
    if(j?.data?.rows){
      const cols=j.data.cols.map(c=>c.name);
      return j.data.rows.map(row=>Object.fromEntries(cols.map((c,i)=>[c,row[i]])));
    }
  }catch(e){console.warn('Fetch failed:',e);}
  return null;
}

async function loadAll(){
  document.getElementById('app').innerHTML=`<div class="loading"><div class="spinner"></div><div class="loading-text">Loading dashboard...</div></div>`;

  const [main,enterprises,rooftops,newdata,entByARR,roofByARR,csmOB]=await Promise.all([
    fetchJSON(URLS.main),
    fetchJSON(URLS.enterprises),
    fetchJSON(URLS.rooftops),
    fetchJSON(URLS.newdata),
    fetchJSON(URLS.entByARR),
    fetchJSON(URLS.roofByARR),
    fetchJSON(URLS.csmOB)
  ]);

  // Filter out epoch zero bad data & empty segments
  const mainClean=(main||FALLBACK.main).filter(d=>!String(d.Month).includes('1970'));
  allData.newdata=(newdata||[]).filter(d=>d.customer_segment&&d.customer_segment!=='');

  // Merge Q4 new enterprise/rooftop data into main by Month+segment
  allData.main=mainClean.map(d=>{
    const match=allData.newdata.find(n=>n.Month===d.Month&&n.customer_segment===d.customer_segment);
    return {
      ...d,
      New_Enterprises_Added: match?parseInt(String(match.New_Enterprises_Added).replace(/,/g,'')):0,
      New_Rooftops_Added: match?parseInt(String(match.New_Rooftops_Added).replace(/,/g,'')):0
    };
  });
  allData.enterprises=enterprises||FALLBACK.enterprises;
  allData.rooftops=rooftops||FALLBACK.rooftops;
  // Normalize entByARR - fix 'apld.enterprise_id' column name issue
  allData.entByARR=(entByARR||FALLBACK.entByARR||[]).map(d=>({
    enterprise_id: d['apld.enterprise_id']||d.enterprise_id||'',
    Enterprise_Name: d.Enterprise_Name||d.enterprise_name||'—',
    Customer_Segment: d.Customer_Segment||d.customer_segment||'',
    Total_Contracted_ARR: d.Total_Contracted_ARR||d.total_contracted_arr||0,
    Plan_Name: d.Plan_Name||d.plan_name||'—'
  }));
  // Normalize roofByARR
  allData.roofByARR=(roofByARR||FALLBACK.roofByARR||[]).map(d=>({
    team_id: d.team_id||'',
    Team_Name: d.Team_Name||d.team_name||'—',
    Enterprise_Name: d.Enterprise_Name||d.enterprise_name||'—',
    Customer_Segment: d.Customer_Segment||d.customer_segment||'',
    Total_Contracted_ARR: d.Total_Contracted_ARR||d.total_contracted_arr||0,
    Plan_Name: d.Plan_Name||d.plan_name||'—'
  }));
  const rawCsm = csmOB||FALLBACK.csmOB||[];
  allData.csmOB=rawCsm.map(d=>({
    Owner: d.Owner||d.owner||'—',
    Owner_Type: d.Owner_Type||d.owner_type||'—',
    Total_Enterprises: d.Total_Enterprises||d.total_enterprises||0,
    Total_Contracted_ARR: d.Total_Contracted_ARR||d.total_contracted_arr||0,
    Customer_Segment: d.Customer_Segment||d.customer_segment||''
  }));

  // Get months (unique, ordered)
  const months=[...new Set(allData.main.map(d=>d.Month))];
  activeMonth=months[0];

  document.getElementById('lastUpd').textContent='Updated '+new Date().toLocaleTimeString();
  render();
}

function getMonths(){return[...new Set(allData.main.map(d=>d.Month))];}
function getSegs(){return['All',...new Set(allData.main.map(d=>d.customer_segment).filter(Boolean))];}

function filteredMain(){
  return allData.main.filter(d=>{
    const monthOk=!activeMonth||d.Month===activeMonth;
    const segOk=activeSeg==='All'||d.customer_segment===activeSeg;
    return monthOk&&segOk;
  });
}

function aggregated(rows){
  if(!rows.length) return {};
  if(rows.length===1) return rows[0];
  const n=rows.length;
  return {
    Total_Images: rows.reduce((s,d)=>s+clean(d.Total_Images),0),
    Total_SKUs: rows.reduce((s,d)=>s+clean(d.Total_SKUs),0),
    'Total Active Enterprises': rows.reduce((s,d)=>s+clean(d['Total Active Enterprises']),0),
    'Total Active Rooftops': rows.reduce((s,d)=>s+clean(d['Total Active Rooftops']),0),
    Avg_Image_TAT_Hours: rows.reduce((s,d)=>s+clean(d.Avg_Image_TAT_Hours),0)/n,
    Avg_SKU_TAT_Hours: rows.reduce((s,d)=>s+clean(d.Avg_SKU_TAT_Hours),0)/n,
    'QC Fix Images': rows.reduce((s,d)=>s+clean(d['QC Fix Images']),0),
    'QC Fix %': rows.reduce((s,d)=>s+clean(d['QC Fix %']),0)/n,
    'Manual Fix': rows.reduce((s,d)=>s+clean(d['Manual Fix']),0),
    'Manual Fix %': rows.reduce((s,d)=>s+clean(d['Manual Fix %']),0)/n,
    true_accuracy: rows.reduce((s,d)=>s+clean(d.true_accuracy),0)/n,
    post_qc_tool_accuracy: rows.reduce((s,d)=>s+clean(d.post_qc_tool_accuracy),0)/n,
    New_Enterprises_Added: rows.reduce((s,d)=>s+clean(d.New_Enterprises_Added),0),
    New_Rooftops_Added: rows.reduce((s,d)=>s+clean(d.New_Rooftops_Added),0),

  };
}

function sortData(data, state){

      // string fallback
      const as=String(a[state.key]||''), bs=String(b[state.key]||'');
      return state.dir*(as>bs?1:-1);
    }
    return state.dir*(av>bv?1:-1);
  });
}

        <div class="table-hd"><span class="table-hd-title">Top 10 Rooftops by SKUs</span><span class="table-hd-badge">Last 3M</span></div>
        <div class="tbl-wrap"><table>
          <thead><tr>
            <th>#</th>
            <th>Team</th>
            <th>Enterprise</th>
            <th>Segment</th>
            ${th('SKUs','Total_SKUs',roofLoadSort,'sortRoofLoad')}
            ${th('ARR','Total_Contracted_ARR',roofLoadSort,'sortRoofLoad')}
          </tr></thead>
          <tbody>${sortData(allData.rooftops,roofLoadSort).map((d,i)=>`<tr>
            <td>${i+1}</td>
            <td>${d.Team_Name}</td>
            <td>${d.Enterprise_Name}</td>
            <td>${segChip(d.Customer_Segment)}</td>
            <td>${fmt(d.Total_SKUs)}</td>
            <td>${fmtARR(d.Total_Contracted_ARR)}</td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>
    </div>

    <!-- TOP 10 BY ARR -->
    <div class="sec-label">Top 10 · By Contracted ARR</div>
    <div class="tables-2">
      <div class="table-card">
        <div class="table-hd"><span class="table-hd-title">Top 10 Enterprises by ARR</span><span class="table-hd-badge">Automobiles</span></div>
        <div class="tbl-wrap"><table>
          <thead><tr>
            <th>#</th>
            <th>Enterprise</th>
            <th>Segment</th>
            <th>Plan</th>
            ${th('ARR','Total_Contracted_ARR',entARRSort,'sortEntARR')}
          </tr></thead>
          <tbody>${sortData(allData.entByARR,entARRSort).map((d,i)=>`<tr>
            <td>${i+1}</td>
            <td>${d.Enterprise_Name||d.enterprise_name||'—'}</td>
            <td>${segChip(d.Customer_Segment||d.customer_segment||'')}</td>
            <td>${d.Plan_Name||d.plan_name||'—'}</td>
            <td>${fmtARR(d.Total_Contracted_ARR||d.total_contracted_arr||0)}</td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>
      <div class="table-card">
        <div class="table-hd"><span class="table-hd-title">Top 10 Rooftops by ARR</span><span class="table-hd-badge">Automobiles</span></div>
        <div class="tbl-wrap"><table>
          <thead><tr>
            <th>#</th>
            <th>Team</th>
            <th>Enterprise</th>
            <th>Segment</th>
            ${th('ARR','Total_Contracted_ARR',roofARRSort,'sortRoofARR')}
          </tr></thead>
          <tbody>${sortData(allData.roofByARR,roofARRSort).map((d,i)=>`<tr>
            <td>${i+1}</td>
            <td>${d.Team_Name||d.team_name||'—'}</td>
            <td>${d.Enterprise_Name||d.enterprise_name||'—'}</td>
            <td>${segChip(d.Customer_Segment||d.customer_segment||'')}</td>
            <td>${fmtARR(d.Total_Contracted_ARR||d.total_contracted_arr||0)}</td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>
    </div>

    <!-- CSM / OB TABLE -->
    <div class="sec-label">Top 10 · By CSM / OB Owner</div>
    <div class="table-card" style="margin-bottom:20px;">
      <div class="table-hd">
        <span class="table-hd-title">Top 10 Enterprises by Account Owner</span>
        <span class="table-hd-badge">CSM / OB</span>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>#</th>
          ${th('Account Owner','Owner',csmOBSort,'sortCsmOB')}
          <th>Role</th>
          <th>Segment</th>
          ${th('Enterprises','Total_Enterprises',csmOBSort,'sortCsmOB')}
          ${th('Contracted ARR','Total_Contracted_ARR',csmOBSort,'sortCsmOB')}
          <th>Avg ARR / Ent</th>
        </tr></thead>
        <tbody>${allData.csmOB.length ? sortData(allData.csmOB,csmOBSort).map((d,i)=>{
          const avgARR = d.Total_Enterprises>0 ? d.Total_Contracted_ARR/d.Total_Enterprises : 0;
          return `<tr>
            <td>${i+1}</td>
            <td>${d.Owner.split('@')[0]}</td>
            <td><span class="badge ${d.Owner_Type==='CSM'?'bg-g':'bg-p'}">${d.Owner_Type}</span></td>
            <td>${segChip(d.Customer_Segment||'')}</td>
            <td>${fmt(d.Total_Enterprises)}</td>
            <td>${fmtARR(d.Total_Contracted_ARR)}</td>
            <td>${fmtARR(avgARR)}</td>
          </tr>`;
        }).join('') : `<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:24px;">No data available</td></tr>`}
        </tbody>
      </table></div>
    </div>

    <!-- FULL DATA TABLE -->
    <div class="sec-label">Full Monthly Data</div>
    <div class="table-card" style="margin-bottom:40px;">
      <div class="table-hd"><span class="table-hd-title">Monthly Summary by Segment</span><span class="table-hd-badge">${allData.main.filter(d=>!String(d.Month).includes('1970')).length} rows</span></div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          ${th('Month','Month',mainSort,'sortMain')}
          ${th('Segment','customer_segment',mainSort,'sortMain')}
          <th>Type</th>
          ${th('Images','Total_Images',mainSort,'sortMain')}
          ${th('SKUs','Total_SKUs',mainSort,'sortMain')}
          ${th('Enterprises','Total Active Enterprises',mainSort,'sortMain')}
          ${th('Rooftops','Total Active Rooftops',mainSort,'sortMain')}
          ${th('Img TAT','Avg_Image_TAT_Hours',mainSort,'sortMain')}
          ${th('SKU TAT','Avg_SKU_TAT_Hours',mainSort,'sortMain')}
          ${th('True Acc','true_accuracy',mainSort,'sortMain')}
          ${th('Post QC Acc','post_qc_tool_accuracy',mainSort,'sortMain')}
          ${th('QC Fix','QC Fix Images',mainSort,'sortMain')}
          ${th('QC Fix %','QC Fix %',mainSort,'sortMain')}
          ${th('Manual Fix','Manual Fix',mainSort,'sortMain')}
          ${th('Manual Fix %','Manual Fix %',mainSort,'sortMain')}
          ${th('New Ent','New_Enterprises_Added',mainSort,'sortMain')}
          ${th('New Roof','New_Rooftops_Added',mainSort,'sortMain')}
          ${th('ARR','Total_Contracted_ARR',mainSort,'sortMain')}
        </tr></thead>
        <tbody>${sortData(allData.main.filter(d=>!String(d.Month).includes('1970')),mainSort).map(d=>`<tr>
          <td>${d.Month}</td>
          <td>${segChip(d.customer_segment||'—')}</td>
          <td><span class="badge ${d.Month_Type==='MTD'?'bg-a':'bg-p'}">${d.Month_Type}</span></td>
          <td>${fmt(d.Total_Images)}</td>
          <td>${fmt(d.Total_SKUs)}</td>
          <td>${fmt(d['Total Active Enterprises'])}</td>
          <td>${fmt(d['Total Active Rooftops'])}</td>
          <td>${clean(d.Avg_Image_TAT_Hours).toFixed(2)}h</td>
          <td>${clean(d.Avg_SKU_TAT_Hours).toFixed(2)}h</td>
          <td>${badge(d.true_accuracy)}</td>
          <td>${badge(d.post_qc_tool_accuracy)}</td>
          <td>${fmt(d['QC Fix Images'])}</td>
          <td>${pct(d['QC Fix %'])}</td>
          <td>${fmt(d['Manual Fix'])}</td>
          <td>${pct(d['Manual Fix %'])}</td>
          <td>${fmt(d.New_Enterprises_Added)}</td>
          <td>${fmt(d.New_Rooftops_Added)}</td>
          <td>${fmtARR(d.Total_Contracted_ARR)}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>
  `;

  buildCharts();
}

function setMonth(m){activeMonth=m;render();}
function setSeg(s){activeSeg=s;render();}

const SEG_COLORS={Ent:'#2563EB',SMB:'#059669',Resellers:'#D97706',Mid:'#6B2FD9'};
const MONTHS_CLEAN=()=>[...new Set(allData.main.filter(d=>!String(d.Month).includes('1970')).map(d=>d.Month))].reverse();
const SEGS_CLEAN=()=>[...new Set(allData.main.map(d=>d.customer_segment).filter(Boolean))];

const BASE={
  responsive:true,maintainAspectRatio:false,
  plugins:{
    legend:{labels:{color:'#7B7A9A',font:{family:'Plus Jakarta Sans',size:11},boxWidth:12,padding:14}},
    datalabels:{display:false}
  },
  scales:{
    x:{ticks:{color:'#7B7A9A',font:{family:'Plus Jakarta Sans',size:10}},grid:{color:'#F0EDF8'}},
    y:{ticks:{color:'#7B7A9A',font:{family:'Plus Jakarta Sans',size:10}},grid:{color:'#F0EDF8'}}
  }
};

function buildCharts(){
  const months=MONTHS_CLEAN();
  const segs=SEGS_CLEAN();

  // Images by segment (stacked bar)
  charts.segImg=new Chart(document.getElementById('cSegImg'),{
    type:'bar',
    data:{labels:months,datasets:segs.map(seg=>({
      label:seg,
      data:months.map(m=>{const r=allData.main.find(d=>d.Month===m&&d.customer_segment===seg);return r?clean(r.Total_Images):0;}),
      backgroundColor:SEG_COLORS[seg]||'#999',borderRadius:3
    }))},
    options:{...BASE,scales:{...BASE.scales,x:{...BASE.scales.x,stacked:true},y:{...BASE.scales.y,stacked:true}}}
  });

  // Accuracy by segment (line)
  charts.segAcc=new Chart(document.getElementById('cSegAcc'),{
    type:'line',
    data:{labels:months,datasets:segs.map(seg=>({
      label:seg,
      data:months.map(m=>{const r=allData.main.find(d=>d.Month===m&&d.customer_segment===seg);return r?clean(r.true_accuracy):null;}),
      borderColor:SEG_COLORS[seg]||'#999',backgroundColor:'transparent',tension:0.4,pointRadius:4,pointBackgroundColor:SEG_COLORS[seg]||'#999'
    }))},
    options:{...BASE,scales:{...BASE.scales,y:{...BASE.scales.y,min:80,max:100}}}
  });

  // TAT by segment (line)
  charts.segTat=new Chart(document.getElementById('cSegTat'),{
    type:'line',
    data:{labels:months,datasets:segs.map(seg=>({
      label:seg,
      data:months.map(m=>{const r=allData.main.find(d=>d.Month===m&&d.customer_segment===seg);return r?clean(r.Avg_Image_TAT_Hours):null;}),
      borderColor:SEG_COLORS[seg]||'#999',backgroundColor:'transparent',tension:0.4,pointRadius:4,pointBackgroundColor:SEG_COLORS[seg]||'#999'
    }))},
    options:{...BASE}
  });

  // QC Fix % by segment (line)
  charts.segFix=new Chart(document.getElementById('cSegFix'),{
    type:'line',
    data:{labels:months,datasets:segs.map(seg=>({
      label:seg,
      data:months.map(m=>{const r=allData.main.find(d=>d.Month===m&&d.customer_segment===seg);return r?clean(r['QC Fix %']):null;}),
      borderColor:SEG_COLORS[seg]||'#999',backgroundColor:'transparent',tension:0.4,pointRadius:4,pointBackgroundColor:SEG_COLORS[seg]||'#999'
    }))},
    options:{...BASE}
  });

  // Enterprises & Rooftops (aggregated all segments)
  charts.ent=new Chart(document.getElementById('cEnt'),{
    type:'line',
    data:{labels:months,datasets:[
      {label:'Active Enterprises',data:months.map(m=>allData.main.filter(d=>d.Month===m).reduce((s,d)=>s+clean(d['Total Active Enterprises']),0)),borderColor:'#6B2FD9',backgroundColor:'rgba(107,47,217,0.07)',tension:0.4,fill:true,pointRadius:4,pointBackgroundColor:'#6B2FD9'},
      {label:'Active Rooftops',data:months.map(m=>allData.main.filter(d=>d.Month===m).reduce((s,d)=>s+clean(d['Total Active Rooftops']),0)),borderColor:'#2563EB',backgroundColor:'rgba(37,99,235,0.05)',tension:0.4,fill:true,pointRadius:4,pointBackgroundColor:'#2563EB'}
    ]},
    options:{...BASE}
  });

  // New enterprises by segment (bar) - from Q4 data
  const newMonths=[...new Set((allData.newdata||[]).map(d=>d.Month))].sort((a,b)=>new Date(a)-new Date(b));
  const newSegs=[...new Set((allData.newdata||[]).map(d=>d.customer_segment).filter(Boolean))];
  charts.newEnt=new Chart(document.getElementById('cNew'),{
    type:'bar',
    data:{labels:newMonths.length?newMonths:months, datasets:newSegs.map(seg=>({
      label:seg,
      data:(newMonths.length?newMonths:months).map(m=>{
        const r=(allData.newdata||[]).find(d=>d.Month===m&&d.customer_segment===seg);
        return r?parseInt(String(r.New_Enterprises_Added).replace(/,/g,'')):0;
      }),
      backgroundColor:SEG_COLORS[seg]||'#999',borderRadius:3
    }))},
    options:{...BASE,scales:{...BASE.scales,x:{...BASE.scales.x,stacked:true},y:{...BASE.scales.y,stacked:true}}}
  });
}

Chart.register(ChartDataLabels);
loadAll();
</script>
</body>
