<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spyne · Image Insights Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --purple:       #6B2FD9;
    --purple-light: #8B5CF6;
    --purple-bg:    #F5F0FF;
    --purple-mid:   #EDE9FE;
    --bg:           #F7F5FF;
    --white:        #FFFFFF;
    --border:       #E5E0F5;
    --text:         #1A1A2E;
    --text-2:       #3D3A5C;
    --muted:        #7B7A9A;
    --green:        #059669;
    --green-bg:     #ECFDF5;
    --amber:        #D97706;
    --amber-bg:     #FFFBEB;
    --red:          #DC2626;
    --red-bg:       #FEF2F2;
    --blue:         #2563EB;
    --blue-bg:      #EFF6FF;
    --shadow-sm:    0 1px 3px rgba(107,47,217,0.08);
    --shadow:       0 4px 16px rgba(107,47,217,0.10);
    --shadow-lg:    0 8px 32px rgba(107,47,217,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── NAV ── */
  .topnav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: var(--shadow-sm);
  }
  .nav-left { display: flex; align-items: center; gap: 16px; }

  /* Spyne logo SVG petals */
  .logo-wrap { display: flex; align-items: center; gap: 10px; }
  .logo-svg { width: 38px; height: 38px; }
  .logo-text { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }

  .nav-divider { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }
  .nav-badge {
    background: var(--purple-mid);
    color: var(--purple);
    font-size: 12px; font-weight: 600;
    padding: 4px 12px; border-radius: 20px;
  }

  .nav-right { display: flex; align-items: center; gap: 14px; }
  .last-upd { font-size: 12px; color: var(--muted); }
  .refresh-btn {
    background: var(--purple);
    color: white; border: none;
    padding: 9px 20px; border-radius: 50px;
    font-size: 13px; font-weight: 700;
    font-family: 'Plus Jakarta Sans', sans-serif;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 2px 8px rgba(107,47,217,0.25);
  }
  .refresh-btn:hover { background: #5B24C4; transform: translateY(-1px); }

  /* ── MAIN ── */
  .main { max-width: 1440px; margin: 0 auto; padding: 32px 40px; }

  /* Hero strip */
  .hero {
    background: linear-gradient(135deg, var(--purple) 0%, #9B59F6 100%);
    border-radius: 16px;
    padding: 28px 36px;
    margin-bottom: 28px;
    display: flex; align-items: center; justify-content: space-between;
    color: white;
    box-shadow: var(--shadow-lg);
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .hero::after {
    content: '';
    position: absolute; bottom: -60px; right: 120px;
    width: 150px; height: 150px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .hero-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .hero-sub { font-size: 13px; opacity: 0.8; }
  .hero-right { display: flex; gap: 40px; position: relative; z-index: 1; }
  .hero-stat { text-align: center; }
  .hero-stat-val { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  .hero-stat-label { font-size: 11px; opacity: 0.75; margin-top: 2px; font-weight: 500; }

  /* ── MONTH TABS ── */
  .month-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 24px; flex-wrap: wrap;
  }
  .month-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; }
  .month-chip {
    padding: 7px 18px; border-radius: 50px;
    border: 1.5px solid var(--border);
    background: var(--white); color: var(--muted);
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .month-chip:hover { border-color: var(--purple); color: var(--purple); }
  .month-chip.active { background: var(--purple); color: white; border-color: var(--purple); box-shadow: 0 2px 8px rgba(107,47,217,0.25); }

  /* ── SECTION LABEL ── */
  .sec-label {
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin: 28px 0 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .sec-label::after { content:''; flex:1; height:1px; background: var(--border); }

  /* ── KPI GRID ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 16px; margin-bottom: 4px; }

  .kpi-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 20px 18px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s, transform 0.2s;
    position: relative; overflow: hidden;
  }
  .kpi-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }

  .kpi-dot {
    width: 8px; height: 8px; border-radius: 50%;
    position: absolute; top: 18px; right: 18px;
  }
  .dot-purple { background: var(--purple); }
  .dot-green  { background: var(--green); }
  .dot-amber  { background: var(--amber); }
  .dot-red    { background: var(--red); }
  .dot-blue   { background: var(--blue); }

  .kpi-icon-box {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; margin-bottom: 14px;
  }
  .ib-purple { background: var(--purple-mid); }
  .ib-green  { background: var(--green-bg); }
  .ib-amber  { background: var(--amber-bg); }
  .ib-red    { background: var(--red-bg); }
  .ib-blue   { background: var(--blue-bg); }

  .kpi-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .kpi-val { font-size: 28px; font-weight: 800; letter-spacing: -1px; line-height: 1; color: var(--text); }
  .kpi-val.cv-purple { color: var(--purple); }
  .kpi-val.cv-green  { color: var(--green); }
  .kpi-val.cv-amber  { color: var(--amber); }
  .kpi-val.cv-blue   { color: var(--blue); }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 6px; font-weight: 500; }

  /* ── CHARTS ── */
  .charts-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .charts-1 { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px; }

  .chart-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    box-shadow: var(--shadow-sm);
  }
  .chart-hd { margin-bottom: 18px; }
  .chart-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .chart-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .chart-wrap { position: relative; height: 230px; }

  /* ── TABLE ── */
  .table-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow-sm);
    overflow: hidden; margin-bottom: 40px;
  }
  .table-hd {
    padding: 18px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .table-hd-title { font-size: 14px; font-weight: 700; }
  .table-hd-count { font-size: 12px; color: var(--muted); background: var(--purple-mid); color: var(--purple); padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left; font-size: 10px; font-weight: 700;
    color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
    padding: 11px 16px; background: var(--bg);
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--purple-bg); }
  tbody td { padding: 13px 16px; white-space: nowrap; color: var(--text-2); font-weight: 500; }
  tbody td:first-child { font-weight: 700; color: var(--purple); }

  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
  }
  .bg-green { background: var(--green-bg); color: var(--green); }
  .bg-amber { background: var(--amber-bg); color: var(--amber); }
  .bg-red   { background: var(--red-bg);   color: var(--red); }

  /* ── LOADING / ERROR ── */
  .loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 60vh; gap: 16px;
  }
  .spinner {
    width: 38px; height: 38px;
    border: 3px solid var(--border);
    border-top-color: var(--purple);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .loading-text { color: var(--muted); font-size: 14px; font-weight: 500; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 1100px) {
    .kpi-grid { grid-template-columns: repeat(3,1fr); }
    .charts-2 { grid-template-columns: 1fr; }
    .hero-right { gap: 24px; }
  }
  @media (max-width: 640px) {
    .main { padding: 16px; }
    .topnav { padding: 0 16px; }
    .kpi-grid { grid-template-columns: repeat(2,1fr); }
    .hero { flex-direction: column; gap: 20px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <div class="nav-left">
    <div class="logo-wrap">
      <!-- Spyne-style colorful petal logo -->
      <svg class="logo-svg" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="19" cy="10" rx="5" ry="9" fill="#F97316" transform="rotate(0 19 19) translate(0 -9)"/>
        <ellipse cx="19" cy="10" rx="5" ry="9" fill="#EAB308" transform="rotate(60 19 19) translate(0 -9)"/>
        <ellipse cx="19" cy="10" rx="5" ry="9" fill="#22C55E" transform="rotate(120 19 19) translate(0 -9)"/>
        <ellipse cx="19" cy="10" rx="5" ry="9" fill="#3B82F6" transform="rotate(180 19 19) translate(0 -9)"/>
        <ellipse cx="19" cy="10" rx="5" ry="9" fill="#8B5CF6" transform="rotate(240 19 19) translate(0 -9)"/>
        <ellipse cx="19" cy="10" rx="5" ry="9" fill="#EC4899" transform="rotate(300 19 19) translate(0 -9)"/>
        <circle cx="19" cy="19" r="5" fill="white"/>
      </svg>
      <span class="logo-text">spyne</span>
    </div>
    <div class="nav-divider"></div>
    <span class="nav-badge">Image Insights · Automobiles</span>
  </div>
  <div class="nav-right">
    <span class="last-upd" id="lastUpd">—</span>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</nav>

<div class="main">
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Loading dashboard...</div>
    </div>
  </div>
</div>

<script>
const EMBEDDED = [
  {"Month":"1 Jun, 2026","Total Active Enterprises":"75","Total Active Rooftops":"133","Total_SKUs":"10,855","Total_Images":"8,331","Avg_SKU_TAT_Hours":"18.32","Avg_Image_TAT_Hours":"12.35","true_accuracy":"90.7 %","QC Fix Images":"751","QC Fix %":"9.01 %","post_qc_tool_accuracy":"99.71 %","Manual Fix":"24","Manual Fix %":"0.29"},
  {"Month":"1 May, 2026","Total Active Enterprises":"556","Total Active Rooftops":"1,165","Total_SKUs":"602,985","Total_Images":"3,490,732","Avg_SKU_TAT_Hours":"10.71","Avg_Image_TAT_Hours":"9.05","true_accuracy":"88.84 %","QC Fix Images":"366,598","QC Fix %":"10.5 %","post_qc_tool_accuracy":"99.34 %","Manual Fix":"22,921","Manual Fix %":"0.66"},
  {"Month":"1 Apr, 2026","Total Active Enterprises":"548","Total Active Rooftops":"1,145","Total_SKUs":"616,303","Total_Images":"3,655,203","Avg_SKU_TAT_Hours":"24.38","Avg_Image_TAT_Hours":"11.58","true_accuracy":"89.81 %","QC Fix Images":"336,827","QC Fix %":"9.22 %","post_qc_tool_accuracy":"99.03 %","Manual Fix":"35,551","Manual Fix %":"0.97"},
  {"Month":"1 Mar, 2026","Total Active Enterprises":"532","Total Active Rooftops":"1,096","Total_SKUs":"542,348","Total_Images":"3,826,701","Avg_SKU_TAT_Hours":"20.67","Avg_Image_TAT_Hours":"11.75","true_accuracy":"91.16 %","QC Fix Images":"293,936","QC Fix %":"7.68 %","post_qc_tool_accuracy":"98.84 %","Manual Fix":"44,429","Manual Fix %":"1.16"}
];

let allData = [], activeMonth = null, charts = {};

const clean = v => parseFloat(String(v||0).replace(/,/g,'').replace(/%/g,'').trim()) || 0;
const fmt = v => {
  const n = clean(v);
  if (!n && !v) return '—';
  return n>=1e6 ? (n/1e6).toFixed(2)+'M' : n>=1000 ? (n/1000).toFixed(1)+'K' : String(n);
};
const pct = v => String(v).replace(' %','%');
const badge = v => {
  const n = clean(v);
  const c = n>=90?'bg-green':n>=80?'bg-amber':'bg-red';
  return `<span class="badge ${c}">${pct(v)}</span>`;
};

async function loadData() {
  document.getElementById('app').innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Loading dashboard...</div></div>`;
  let data = null;
  try {
    const r = await fetch('/api/query', {signal: AbortSignal.timeout(5000)});
    const j = await r.json();
    if (Array.isArray(j) && j.length) data = j;
    else if (j?.data?.rows) {
      const cols = j.data.cols.map(c=>c.name);
      data = j.data.rows.map(row=>Object.fromEntries(cols.map((c,i)=>[c,row[i]])));
    }
  } catch {}
  allData = (data && data.length) ? data : EMBEDDED;
  activeMonth = allData[0].Month;
  document.getElementById('lastUpd').textContent = 'Updated '+new Date().toLocaleTimeString();
  render();
}

function render() {
  const row = allData.find(d=>d.Month===activeMonth)||allData[0];
  destroyCharts();

  document.getElementById('app').innerHTML = `
    <!-- Hero -->
    <div class="hero">
      <div>
        <div class="hero-title">Image Processing Dashboard</div>
        <div class="hero-sub">Automobiles segment · Last 3 months · ${activeMonth}</div>
      </div>
      <div class="hero-right">
        <div class="hero-stat">
          <div class="hero-stat-val">${fmt(row.Total_Images)}</div>
          <div class="hero-stat-label">Total Images</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-val">${fmt(row.Total_SKUs)}</div>
          <div class="hero-stat-label">Total SKUs</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-val">${pct(row.true_accuracy)}</div>
          <div class="hero-stat-label">True Accuracy</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-val">${pct(row.post_qc_tool_accuracy)}</div>
          <div class="hero-stat-label">Post QC Accuracy</div>
        </div>
      </div>
    </div>

    <!-- Month chips -->
    <div class="month-row">
      <span class="month-label">Period</span>
      ${allData.map(d=>`<div class="month-chip ${d.Month===activeMonth?'active':''}" onclick="sel('${d.Month}')">${d.Month}</div>`).join('')}
    </div>

    <!-- KPI Row 1 -->
    <div class="sec-label">Volume & Capacity</div>
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-dot dot-purple"></div>
        <div class="kpi-icon-box ib-purple">🖼️</div>
        <div class="kpi-label">Total Images</div>
        <div class="kpi-val cv-purple">${fmt(row.Total_Images)}</div>
        <div class="kpi-sub">verified & QC done</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-dot dot-purple"></div>
        <div class="kpi-icon-box ib-purple">📦</div>
        <div class="kpi-label">Total SKUs</div>
        <div class="kpi-val cv-purple">${fmt(row.Total_SKUs)}</div>
        <div class="kpi-sub">processed SKUs</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-dot dot-blue"></div>
        <div class="kpi-icon-box ib-blue">🏢</div>
        <div class="kpi-label">Active Enterprises</div>
        <div class="kpi-val cv-blue">${fmt(row['Total Active Enterprises'])}</div>
        <div class="kpi-sub">unique clients</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-dot dot-blue"></div>
        <div class="kpi-icon-box ib-blue">📍</div>
        <div class="kpi-label">Active Rooftops</div>
        <div class="kpi-val cv-blue">${fmt(row['Total Active Rooftops'])}</div>
        <div class="kpi-sub">unique team IDs</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-dot dot-amber"></div>
        <div class="kpi-icon-box ib-amber">⏱️</div>
        <div class="kpi-label">Image TAT</div>
        <div class="kpi-val cv-amber">${clean(row.Avg_Image_TAT_Hours).toFixed(2)}h</div>
        <div class="kpi-sub">avg hours per image</div>
      </div>
    </div>

    <!-- KPI Row 2 -->
    <div class="sec-label">Quality & Accuracy</div>
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-dot dot-amber"></div>
        <div class="kpi-icon-box ib-amber">⏱️</div>
        <div class="kpi-label">SKU TAT</div>
        <div class="kpi-val cv-amber">${clean(row.Avg_SKU_TAT_Hours).toFixed(2)}h</div>
        <div class="kpi-sub">avg hours per SKU</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-dot dot-green"></div>
        <div class="kpi-icon-box ib-green">🎯</div>
        <div class="kpi-label">True Accuracy</div>
        <div class="kpi-val cv-green">${pct(row.true_accuracy)}</div>
        <div class="kpi-sub">pre QC tool</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-dot dot-green"></div>
        <div class="kpi-icon-box ib-green">✅</div>
        <div class="kpi-label">Post QC Accuracy</div>
        <div class="kpi-val cv-green">${pct(row.post_qc_tool_accuracy)}</div>
        <div class="kpi-sub">after QC tool</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-dot dot-red"></div>
        <div class="kpi-icon-box ib-red">🔧</div>
        <div class="kpi-label">QC Fix Images</div>
        <div class="kpi-val">${fmt(row['QC Fix Images'])}</div>
        <div class="kpi-sub">${pct(row['QC Fix %'])} of total</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-dot dot-red"></div>
        <div class="kpi-icon-box ib-red">✏️</div>
        <div class="kpi-label">Manual Fix</div>
        <div class="kpi-val">${fmt(row['Manual Fix'])}</div>
        <div class="kpi-sub">${pct(row['Manual Fix %'])} of total</div>
      </div>
    </div>

    <!-- Charts row 1 -->
    <div class="sec-label">Trends · Last ${allData.length} Months</div>
    <div class="charts-2">
      <div class="chart-card">
        <div class="chart-hd"><div class="chart-title">Images & SKUs Volume</div><div class="chart-sub">Monthly processing volume</div></div>
        <div class="chart-wrap"><canvas id="cVolume"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-hd"><div class="chart-title">AI Accuracy</div><div class="chart-sub">True vs Post-QC accuracy (%)</div></div>
        <div class="chart-wrap"><canvas id="cAccuracy"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-hd"><div class="chart-title">TAT Trends</div><div class="chart-sub">Avg turnaround hours</div></div>
        <div class="chart-wrap"><canvas id="cTat"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-hd"><div class="chart-title">QC Fix vs Manual Fix %</div><div class="chart-sub">Correction breakdown</div></div>
        <div class="chart-wrap"><canvas id="cFix"></canvas></div>
      </div>
    </div>
    <div class="charts-1">
      <div class="chart-card">
        <div class="chart-hd"><div class="chart-title">Active Enterprises & Rooftops</div><div class="chart-sub">Monthly active client counts</div></div>
        <div class="chart-wrap"><canvas id="cEnt"></canvas></div>
      </div>
    </div>

    <!-- Table -->
    <div class="sec-label">Full Data Table</div>
    <div class="table-card">
      <div class="table-hd">
        <span class="table-hd-title">Monthly Summary</span>
        <span class="table-hd-count">${allData.length} months</span>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>Month</th><th>Total Images</th><th>Total SKUs</th>
            <th>Enterprises</th><th>Rooftops</th>
            <th>Img TAT</th><th>SKU TAT</th>
            <th>True Accuracy</th><th>Post QC Accuracy</th>
            <th>QC Fix</th><th>QC Fix %</th><th>Manual Fix</th><th>Manual Fix %</th>
          </tr></thead>
          <tbody>
            ${allData.map(d=>`<tr>
              <td>${d.Month}</td>
              <td>${fmt(d.Total_Images)}</td>
              <td>${fmt(d.Total_SKUs)}</td>
              <td>${fmt(d['Total Active Enterprises'])}</td>
              <td>${fmt(d['Total Active Rooftops'])}</td>
              <td>${clean(d.Avg_Image_TAT_Hours).toFixed(2)}h</td>
              <td>${clean(d.Avg_SKU_TAT_Hours).toFixed(2)}h</td>
              <td>${badge(d.true_accuracy)}</td>
              <td>${badge(d.post_qc_tool_accuracy)}</td>
              <td>${fmt(d['QC Fix Images'])}</td>
              <td>${pct(d['QC Fix %'])}</td>
              <td>${fmt(d['Manual Fix'])}</td>
              <td>${pct(d['Manual Fix %'])}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
  buildCharts();
}

function sel(m) { activeMonth = m; render(); }
function destroyCharts() { Object.values(charts).forEach(c=>c?.destroy()); charts={}; }

const OPTS = {
  responsive:true, maintainAspectRatio:false,
  plugins:{ legend:{ labels:{ color:'#7B7A9A', font:{family:'Plus Jakarta Sans',size:11}, boxWidth:12, padding:14 }}},
  scales:{
    x:{ ticks:{color:'#7B7A9A',font:{family:'Plus Jakarta Sans',size:11}}, grid:{color:'#F0EDF8'} },
    y:{ ticks:{color:'#7B7A9A',font:{family:'Plus Jakarta Sans',size:11}}, grid:{color:'#F0EDF8'} }
  }
};

function buildCharts() {
  const rev = [...allData].reverse();
  const labels = rev.map(d=>d.Month);

  charts.vol = new Chart(document.getElementById('cVolume'),{
    type:'bar', data:{labels, datasets:[
      {label:'Images', data:rev.map(d=>clean(d.Total_Images)), backgroundColor:'#6B2FD9', borderRadius:5},
      {label:'SKUs',   data:rev.map(d=>clean(d.Total_SKUs)),   backgroundColor:'#C4B5FD', borderRadius:5}
    ]}, options:{...OPTS}
  });

  charts.acc = new Chart(document.getElementById('cAccuracy'),{
    type:'line', data:{labels, datasets:[
      {label:'True Accuracy %',    data:rev.map(d=>clean(d.true_accuracy)),         borderColor:'#059669', backgroundColor:'rgba(5,150,105,0.08)',  tension:0.4, fill:true, pointBackgroundColor:'#059669', pointRadius:4},
      {label:'Post QC Accuracy %', data:rev.map(d=>clean(d.post_qc_tool_accuracy)), borderColor:'#6B2FD9', backgroundColor:'rgba(107,47,217,0.05)', tension:0.4, fill:true, pointBackgroundColor:'#6B2FD9', pointRadius:4}
    ]}, options:{...OPTS, scales:{...OPTS.scales, y:{...OPTS.scales.y, min:80, max:100}}}
  });

  charts.tat = new Chart(document.getElementById('cTat'),{
    type:'line', data:{labels, datasets:[
      {label:'Image TAT (hrs)', data:rev.map(d=>clean(d.Avg_Image_TAT_Hours)), borderColor:'#D97706', backgroundColor:'rgba(217,119,6,0.08)',   tension:0.4, fill:true, pointBackgroundColor:'#D97706', pointRadius:4},
      {label:'SKU TAT (hrs)',   data:rev.map(d=>clean(d.Avg_SKU_TAT_Hours)),   borderColor:'#6B2FD9', backgroundColor:'rgba(107,47,217,0.06)', tension:0.4, fill:true, pointBackgroundColor:'#6B2FD9', pointRadius:4}
    ]}, options:{...OPTS}
  });

  charts.fix = new Chart(document.getElementById('cFix'),{
    type:'bar', data:{labels, datasets:[
      {label:'QC Fix %',     data:rev.map(d=>clean(d['QC Fix %'])),     backgroundColor:'#D97706', borderRadius:5},
      {label:'Manual Fix %', data:rev.map(d=>clean(d['Manual Fix %'])), backgroundColor:'#DC2626', borderRadius:5}
    ]}, options:{...OPTS}
  });

  charts.ent = new Chart(document.getElementById('cEnt'),{
    type:'line', data:{labels, datasets:[
      {label:'Active Enterprises', data:rev.map(d=>clean(d['Total Active Enterprises'])), borderColor:'#6B2FD9', backgroundColor:'rgba(107,47,217,0.07)', tension:0.4, fill:true, pointBackgroundColor:'#6B2FD9', pointRadius:4},
      {label:'Active Rooftops',    data:rev.map(d=>clean(d['Total Active Rooftops'])),    borderColor:'#2563EB', backgroundColor:'rgba(37,99,235,0.05)',    tension:0.4, fill:true, pointBackgroundColor:'#2563EB', pointRadius:4}
    ]}, options:{...OPTS}
  });
}

loadData();
</script>
</body>
</html>
